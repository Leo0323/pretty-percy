<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Sign up</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
	<script src="js/login.js"></script>
	<link rel="stylesheet" href="css/lgin.css" />
</head>
<body>
    <!-- 装饰球 -->
    <div class="gradient-blob blob1"></div>
    <div class="gradient-blob blob2"></div>

    <!-- 主容器 -->
    <div class="auth-container">
        <div class="auth-card">
            <!-- 登录表单 -->
            <div class="form-container active" id="loginForm">
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Sign in to your account</p>

                <div class="error-message" id="loginError"></div>
                <div class="success-message" id="loginSuccess"></div>

                <div class="input-group">
                    <label class="input-label">Username</label>
                    <input type="text" id="loginUsername" class="input-field" placeholder="Enter your username" autofocus>
                </div>

                <div class="input-group">
                    <label class="input-label">Password</label>
                    <input type="password" id="loginPassword" class="input-field" placeholder="Enter your password">
                </div>

                <button class="auth-button login-button" onclick="handleLogin()">
                    Sign In
                </button>

                <div class="divider">
                    <span class="divider-text">Or continue with</span>
                </div>

                <button type="button" class="github-button" onclick="githubLogin()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v 3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                    </svg>
                    Sign in with GitHub
                </button>

                <div class="auth-toggle">
                    Don't have an account? <a onclick="toggleForm()">Sign up</a>
                </div>
            </div>

            <!-- 注册表单 -->
            <div class="form-container" id="signupForm">
                <h1 class="auth-title">Create Account</h1>
                <p class="auth-subtitle">Join us in seconds</p>

                <div class="error-message" id="signupError"></div>
                <div class="success-message" id="signupSuccess"></div>

                <div class="input-group">
                    <label class="input-label">Username</label>
                    <input type="text" id="signupUsername" class="input-field" placeholder="Choose a username">
                </div>

                <div class="input-group">
                    <label class="input-label">Email</label>
                    <input type="email" id="signupEmail" class="input-field" placeholder="Enter your email">
                </div>

                <div class="input-group">
                    <label class="input-label">Password</label>
                    <input type="password" id="signupPassword" class="input-field" placeholder="Create a password">
                </div>

                <div class="input-group">
                    <label class="input-label">Confirm Password</label>
                    <input type="password" id="signupConfirmPassword" class="input-field" placeholder="Confirm password">
                </div>

                <div class="input-group">
                    <label class="input-label">Gender</label>
                    <div class="sex-group">
                        <div class="sex-option">
                            <input type="radio" id="sexMale" name="sex" class="sex-input" value="male">
                            <label for="sexMale" class="sex-label">Male</label>
                        </div>
                        <div class="sex-option">
                            <input type="radio" id="sexFemale" name="sex" class="sex-input" value="female">
                            <label for="sexFemale" class="sex-label">Female</label>
                        </div>
                        <div class="sex-option">
                            <input type="radio" id="sexOther" name="sex" class="sex-input" value="other">
                            <label for="sexOther" class="sex-label">Other</label>
                        </div>
                    </div>
                </div>

                <button class="auth-button signup-button" onclick="handleSignup()">
                    Create Account
                </button>

                <div class="divider">
                    <span class="divider-text">Or continue with</span>
                </div>

                <button type="button" class="github-button" onclick="githubLogin()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v 3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                    </svg>
                    Sign up with GitHub
                </button>

                <div class="auth-toggle">
                    Already have an account? <a onclick="toggleForm()">Sign in</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
